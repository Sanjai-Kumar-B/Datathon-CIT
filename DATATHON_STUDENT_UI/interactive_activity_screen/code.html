<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Math Fun! - Interactive Matching</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#38bdf8",
                        "background-light": "#f0f9ff",
                        "background-dark": "#0c4a6e",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/20 px-6 md:px-20 py-4 bg-white dark:bg-background-dark/50 backdrop-blur-sm">
<div class="flex items-center gap-4 text-primary">
<div class="size-8 flex items-center justify-center bg-primary rounded-lg text-white">
<span class="material-symbols-outlined text-2xl">calculate</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">Math Fun!</h2>
</div>
<div class="flex flex-1 justify-end gap-4">
<div class="flex gap-2">
<button class="flex h-12 w-12 cursor-pointer items-center justify-center overflow-hidden rounded-xl bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">home</span>
</button>
<button class="flex h-12 w-12 cursor-pointer items-center justify-center overflow-hidden rounded-xl bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">help</span>
</button>
</div>
<div class="bg-primary/20 border-2 border-primary rounded-full size-12 flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Cartoon avatar of a smiling child student" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8odnAjywgsEamtSSKZt6A4598Mtw7lZpm5KQR1vQzk_-mBLB6tLp1Ppdl745adiUypxr-FD_gSIW-mG5Pir9am4hWOiWb0u4UjltZeDdBZ0sd-pHHlZndsnB_KL-sT7U2F1rkhFhJKSxvhFfNjAKO6TrMpYthjSJYtfDCUcSk7B0CwNYGHRqnReKuaCZElY5FKBquzwYslMgBExknSHuSEgKTCvWVK2XSvDH7qKSODE_q13H_LvGjXTryPGUseDc1WB5nNJvF5rLO"/>
</div>
</div>
</header>
<main class="flex flex-1 justify-center py-8">
<div class="layout-content-container flex flex-col max-w-[960px] flex-1 px-4">
<!-- Progress Section -->
<div class="flex flex-col gap-3 p-6 bg-white dark:bg-slate-800 rounded-xl shadow-sm mb-6 border border-primary/10">
<div class="flex gap-6 justify-between items-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">stars</span>
<p class="text-slate-900 dark:text-slate-100 text-lg font-bold">Matching Challenge</p>
</div>
<p class="text-primary text-lg font-bold">50%</p>
</div>
<div class="h-4 w-full rounded-full bg-primary/10 overflow-hidden">
<div class="h-full rounded-full bg-primary shadow-[0_0_10px_rgba(56,189,248,0.5)] transition-all duration-500" style="width: 50%;"></div>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Keep going! You've matched 2 of 4 numbers.</p>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl md:text-4xl font-bold leading-tight text-center pb-8">Match the Numbers!</h1>
<!-- Interactive Game Area -->
<div class="grid md:grid-cols-2 gap-12 items-start">
<!-- Left Side: Draggable Numbers -->
<div class="flex flex-col gap-6">
<h3 class="text-slate-500 dark:text-slate-400 text-sm font-bold uppercase tracking-widest px-2">Drag These</h3>
<div class="grid grid-cols-2 gap-6">
<!-- Draggable Item 1 -->
<div class="flex flex-col gap-4 p-4 rounded-2xl bg-white dark:bg-slate-800 border-4 border-dashed border-primary/30 hover:border-primary transition-all cursor-grab active:cursor-grabbing group">
<div class="w-full aspect-square bg-primary/5 rounded-xl flex items-center justify-center text-primary text-7xl font-black group-hover:scale-110 transition-transform">
                                    2
                                </div>
<div class="text-center">
<p class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase">Move Me</p>
</div>
</div>
<!-- Draggable Item 2 -->
<div class="flex flex-col gap-4 p-4 rounded-2xl bg-white dark:bg-slate-800 border-4 border-dashed border-primary/30 hover:border-primary transition-all cursor-grab active:cursor-grabbing group">
<div class="w-full aspect-square bg-primary/5 rounded-xl flex items-center justify-center text-primary text-7xl font-black group-hover:scale-110 transition-transform">
                                    3
                                </div>
<div class="text-center">
<p class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase">Move Me</p>
</div>
</div>
</div>
</div>
<!-- Right Side: Drop Targets -->
<div class="flex flex-col gap-6">
<h3 class="text-slate-500 dark:text-slate-400 text-sm font-bold uppercase tracking-widest px-2">Drop Here</h3>
<div class="flex flex-col gap-6">
<!-- Drop Zone 1 -->
<div class="flex items-center gap-6 p-6 rounded-2xl bg-primary/5 border-4 border-primary/20 min-h-[140px] relative overflow-hidden group">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
<div class="flex-1">
<div class="flex gap-2 mb-2">
<span class="text-5xl">🍎</span>
<span class="text-5xl">🍎</span>
</div>
<p class="text-slate-700 dark:text-slate-200 text-xl font-bold">Two Apples</p>
</div>
<div class="w-24 h-24 border-4 border-dashed border-primary/40 rounded-xl flex items-center justify-center bg-white dark:bg-slate-900 shadow-inner">
<span class="material-symbols-outlined text-primary/30 text-4xl">add</span>
</div>
</div>
<!-- Drop Zone 2 -->
<div class="flex items-center gap-6 p-6 rounded-2xl bg-primary/5 border-4 border-primary/20 min-h-[140px] relative overflow-hidden group">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
<div class="flex-1">
<div class="flex gap-2 mb-2">
<span class="text-5xl">🍎</span>
<span class="text-5xl">🍎</span>
<span class="text-5xl">🍎</span>
</div>
<p class="text-slate-700 dark:text-slate-200 text-xl font-bold">Three Apples</p>
</div>
<div class="w-24 h-24 border-4 border-dashed border-primary/40 rounded-xl flex items-center justify-center bg-white dark:bg-slate-900 shadow-inner">
<span class="material-symbols-outlined text-primary/30 text-4xl">add</span>
</div>
</div>
</div>
</div>
</div>
<!-- Footer Controls -->
<div class="mt-12 flex justify-center gap-6">
<button class="px-8 py-4 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 rounded-2xl font-bold text-lg hover:bg-slate-300 dark:hover:bg-slate-600 transition-all">
                        Reset Game
                    </button>
<button class="px-10 py-4 bg-primary text-white rounded-2xl font-bold text-lg shadow-lg shadow-primary/30 hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
<span>Check Answers</span>
<span class="material-symbols-outlined">check_circle</span>
</button>
</div>
</div>
</main>
</div>
</div>
</body></html>
