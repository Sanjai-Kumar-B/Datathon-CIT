<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0ea5e9", // Sky blue primary
                        "background-light": "#f0f9ff", // Soft sky blue background
                        "background-dark": "#0c4a6e", // Deep sky blue dark background
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between border-b border-primary/10 bg-white dark:bg-slate-900 px-6 py-4 md:px-20 lg:px-40">
<div class="flex items-center gap-3">
<div class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary text-white">
<span class="material-symbols-outlined text-3xl">numbers</span>
</div>
<h2 class="text-xl font-black tracking-tight text-slate-900 dark:text-white uppercase">Numbers</h2>
</div>
<div class="flex items-center gap-4">
<button class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-100 dark:bg-primary/20 text-slate-700 dark:text-primary">
<span class="material-symbols-outlined">settings</span>
</button>
<div class="hidden sm:flex items-center gap-2 rounded-full border border-primary/20 bg-primary/5 px-4 py-1.5">
<span class="material-symbols-outlined text-primary text-lg">stars</span>
<span class="font-bold text-primary">1,240</span>
</div>
</div>
</header>
<main class="flex flex-1 flex-col items-center px-6 py-8 md:px-20 lg:px-40">
<!-- Profile & Welcome Section -->
<div class="mb-10 flex w-full max-w-3xl items-center gap-4">
<div class="h-16 w-16 overflow-hidden rounded-full border-4 border-primary bg-primary/20 shadow-lg">
<img alt="Child profile avatar" class="h-full w-full object-cover" data-alt="Cute colorful monster avatar for child profile" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAmbdt910wtJm-da-HBjV8EnuS6AtD1lTvB1b678WNdYUX1T9t9lAqUEw6ALVcXIJgiqMLlJ4fbsSPP_1HO7-GiYBhAIMlLMmD-E4BSt2pzWuRbC_VS2CmBOBdAtFCmwp8x6vkJzA95PWzLolaDQnepmvjlH1nynwPKDvaL9dy5GX1fxVVLMzIRUsELX9IkptEsmEAo_iuVnXsxCqaw9MIyvMK87L2d1k8-JGTc5Mg_OLXopm7bq9mNNMBoEWUbolgT6mM_0YIQrVJj"/>
</div>
<div>
<h1 class="text-2xl font-black text-slate-900 dark:text-white">Hi, Little Explorer!</h1>
<p class="text-slate-500 dark:text-slate-400 font-medium">Ready to learn about Numbers today?</p>
</div>
</div>
<!-- Learning Mode Selection Area -->
<div class="flex w-full max-w-3xl flex-col gap-6">
<div class="mb-2">
<h2 class="text-3xl font-black tracking-tight text-slate-900 dark:text-white">Choose an Adventure</h2>
<p class="text-slate-500 dark:text-slate-400">Pick how you want to play and learn</p>
</div>
<!-- Large Playful Selection Buttons -->
<div class="flex flex-col gap-5">
<!-- Flashcards Button -->
<button class="group flex w-full items-center gap-6 rounded-3xl bg-white dark:bg-primary/10 p-6 shadow-sm ring-1 ring-slate-200 dark:ring-primary/20 transition-all hover:-translate-y-1 hover:shadow-xl active:scale-95">
<div class="flex h-20 w-20 flex-shrink-0 items-center justify-center rounded-2xl bg-amber-100 dark:bg-amber-900/30 text-amber-500">
<span class="material-symbols-outlined text-5xl">style</span>
</div>
<div class="flex flex-col text-left">
<span class="text-2xl font-black text-slate-900 dark:text-white">Learn with Flashcards</span>
<p class="text-slate-500 dark:text-slate-400 font-medium">See numbers and count the pictures!</p>
</div>
<div class="ml-auto hidden sm:block">
<span class="material-symbols-outlined text-slate-300 group-hover:text-primary group-hover:translate-x-1 transition-all">chevron_right</span>
</div>
</button>
<!-- Video Lesson Button -->
<button class="group flex w-full items-center gap-6 rounded-3xl bg-white dark:bg-primary/10 p-6 shadow-sm ring-1 ring-slate-200 dark:ring-primary/20 transition-all hover:-translate-y-1 hover:shadow-xl active:scale-95">
<div class="flex h-20 w-20 flex-shrink-0 items-center justify-center rounded-2xl bg-sky-100 dark:bg-sky-900/30 text-sky-500">
<span class="material-symbols-outlined text-5xl">smart_display</span>
</div>
<div class="flex flex-col text-left">
<span class="text-2xl font-black text-slate-900 dark:text-white">Watch Cartoon Lesson</span>
<p class="text-slate-500 dark:text-slate-400 font-medium">Fun animations that show how numbers work.</p>
</div>
<div class="ml-auto hidden sm:block">
<span class="material-symbols-outlined text-slate-300 group-hover:text-primary group-hover:translate-x-1 transition-all">chevron_right</span>
</div>
</button>
<!-- Game Button -->
<button class="group flex w-full items-center gap-6 rounded-3xl bg-primary/10 dark:bg-primary p-6 shadow-lg shadow-primary/20 ring-4 ring-primary transition-all hover:-translate-y-1 hover:shadow-2xl active:scale-95">
<div class="flex h-20 w-20 flex-shrink-0 items-center justify-center rounded-2xl bg-white text-primary">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">videogame_asset</span>
</div>
<div class="flex flex-col text-left">
<span class="text-2xl font-black text-primary dark:text-white">Play Learning Game</span>
<p class="text-primary/70 dark:text-white/80 font-medium">Win stars by solving number puzzles!</p>
</div>
<div class="ml-auto hidden sm:block">
<span class="material-symbols-outlined text-primary/40 dark:text-white/40 group-hover:translate-x-1 transition-all">chevron_right</span>
</div>
</button>
</div>
</div>
<!-- Footer Stats/Progress -->
<div class="mt-12 flex w-full max-w-3xl items-center justify-between rounded-2xl bg-white dark:bg-white/5 p-4 shadow-sm">
<div class="flex items-center gap-3">
<div class="h-10 w-10 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-green-600">
<span class="material-symbols-outlined">trending_up</span>
</div>
<div>
<p class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest leading-none">Your Progress</p>
<p class="text-sm font-black text-slate-900 dark:text-white leading-tight">Level 5: Explorer</p>
</div>
</div>
<div class="h-2 flex-1 mx-6 rounded-full bg-slate-200 dark:bg-white/10 overflow-hidden">
<div class="h-full bg-primary rounded-full w-[65%] shadow-[0_0_10px_rgba(14,165,233,0.5)]"></div>
</div>
<button class="text-sm font-bold text-primary hover:underline">View Roadmap</button>
</div>
</main>
<!-- Decorative Elements -->
<div class="fixed bottom-0 left-0 -z-10 h-64 w-64 translate-x-[-20%] translate-y-[20%] rounded-full bg-primary/10 blur-3xl"></div>
<div class="fixed top-0 right-0 -z-10 h-96 w-96 translate-x-[20%] translate-y-[-20%] rounded-full bg-primary/20 blur-3xl"></div>
</div>
</div>
</body></html>
