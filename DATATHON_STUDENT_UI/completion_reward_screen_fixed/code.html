<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Completion Reward Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0ea5e9", // Vibrant sky blue
                        "background-light": "#f0f9ff", // Soft sky blue background
                        "background-dark": "#0c1a25", // Deep navy/dark blue
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Header -->
<header class="flex items-center justify-between border-b border-primary/10 px-6 py-4 lg:px-40">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center w-10 h-10 rounded-xl bg-primary text-white shadow-sm shadow-primary/20">
<span class="material-symbols-outlined text-2xl">school</span>
</div>
<h2 class="text-xl font-bold tracking-tight">Learning App</h2>
</div>
<button class="flex items-center justify-center rounded-xl h-10 w-10 bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 py-10 lg:px-40">
<!-- Celebration Visuals Card -->
<div class="w-full max-w-2xl bg-white dark:bg-slate-800/50 rounded-3xl p-8 lg:p-12 shadow-xl shadow-primary/10 text-center relative overflow-hidden">
<!-- Decorative Floating Elements (Confetti feel) -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-30">
<div class="absolute top-10 left-10 w-4 h-4 rounded-full bg-primary animate-bounce"></div>
<div class="absolute top-20 right-20 w-3 h-3 bg-blue-400 rounded-sm rotate-12"></div>
<div class="absolute bottom-20 left-1/4 w-4 h-2 bg-indigo-400 -rotate-12"></div>
<div class="absolute top-1/2 right-10 w-5 h-5 border-4 border-primary/30 rounded-full"></div>
<div class="absolute bottom-10 right-1/4 w-3 h-3 bg-yellow-400 rounded-full"></div>
</div>
<!-- Main Hero Animation/Icon -->
<div class="relative z-10 flex flex-col items-center">
<div class="w-48 h-48 lg:w-64 lg:h-64 mb-8 bg-gradient-to-br from-sky-300 to-primary rounded-full flex items-center justify-center shadow-2xl shadow-primary/20">
<span class="material-symbols-outlined text-white text-8xl lg:text-9xl scale-125" style="font-variation-settings: 'FILL' 1">stars</span>
</div>
<h1 class="text-primary text-4xl lg:text-5xl font-extrabold mb-2">Great Job!</h1>
<p class="text-slate-600 dark:text-slate-300 text-xl lg:text-2xl font-bold mb-10">You learned Numbers!</p>
<!-- Rewards Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-md">
<!-- Star Reward -->
<div class="bg-primary/5 dark:bg-primary/10 border-2 border-primary/20 rounded-2xl p-5 flex flex-col items-center gap-3">
<div class="w-16 h-16 bg-white dark:bg-slate-700 rounded-full flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-yellow-500 text-4xl" style="font-variation-settings: 'FILL' 1">grade</span>
</div>
<div class="text-center">
<p class="font-bold text-lg text-slate-800 dark:text-slate-100">+1 Star</p>
<p class="text-sm text-slate-500 dark:text-slate-400">Golden Star earned</p>
</div>
</div>
<!-- Badge Reward -->
<div class="bg-primary/5 dark:bg-primary/10 border-2 border-primary/20 rounded-2xl p-5 flex flex-col items-center gap-3">
<div class="w-16 h-16 bg-white dark:bg-slate-700 rounded-full flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1">verified</span>
</div>
<div class="text-center">
<p class="font-bold text-lg text-slate-800 dark:text-slate-100">Numbers Master</p>
<p class="text-sm text-slate-500 dark:text-slate-400">Badge unlocked</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-12 flex flex-col sm:flex-row gap-4 w-full">
<button class="flex-1 bg-primary text-white font-bold py-4 px-8 rounded-2xl hover:scale-[1.02] active:scale-95 transition-all text-lg shadow-lg shadow-primary/30 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">rocket_launch</span>
                                Try another activity
                            </button>
<button class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-200 font-bold py-4 px-8 rounded-2xl hover:bg-slate-200 dark:hover:bg-slate-600 transition-all text-lg flex items-center justify-center gap-2">
<span class="material-symbols-outlined">home</span>
                                Back to Home
                            </button>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation for visual balance -->
<footer class="p-6 text-center text-slate-400 dark:text-slate-500 text-sm">
                Keep up the amazing work, little learner!
            </footer>
</div>
</div>
</body></html>
