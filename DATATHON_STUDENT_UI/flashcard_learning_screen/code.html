<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0ea5e9", // Sky blue primary
                        "background-light": "#f0f9ff", // Soft sky blue background
                        "background-dark": "#0c4a6e", // Darker blue for dark mode
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Flashcard Fun - Learning Numbers</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between border-b border-primary/10 bg-white dark:bg-slate-900 px-4 md:px-10 py-4">
<div class="flex items-center gap-3">
<div class="bg-primary p-2 rounded-lg text-white">
<span class="material-symbols-outlined block">school</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">Flashcard Fun</h2>
</div>
<div class="flex gap-3">
<button class="flex items-center justify-center rounded-xl h-10 w-10 bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">vibration</span>
</button>
<button class="flex items-center justify-center rounded-xl h-10 w-10 bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center p-4 md:p-8 max-w-5xl mx-auto w-full">
<!-- Breadcrumbs -->
<nav class="flex items-center gap-2 mb-8 w-full">
<a class="text-primary font-semibold hover:underline" href="#">Learning</a>
<span class="text-slate-400">/</span>
<span class="text-slate-600 dark:text-slate-400">Numbers</span>
</nav>
<!-- Flashcard Section with Navigation Arrows -->
<div class="relative w-full flex items-center justify-between gap-4 md:gap-12">
<!-- Left Arrow Button -->
<button class="hidden md:flex items-center justify-center rounded-full w-14 h-14 bg-white dark:bg-slate-800 shadow-lg border-4 border-primary/20 text-primary hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-4xl">arrow_back_ios_new</span>
</button>
<!-- Main Flashcard -->
<div class="flex-1 max-w-2xl">
<div class="bg-white dark:bg-slate-800 rounded-[2.5rem] border-[12px] border-primary/20 shadow-2xl overflow-hidden aspect-[4/5] md:aspect-[4/3] flex flex-col items-center justify-center p-8 transition-transform hover:rotate-1">
<!-- Large Number Display -->
<div class="mb-4">
<span class="text-9xl md:text-[12rem] font-black text-primary drop-shadow-sm">1</span>
</div>
<!-- Illustration Placeholder -->
<div class="w-48 h-48 md:w-64 md:h-64 bg-primary/5 rounded-full flex items-center justify-center mb-6">
<img alt="Apple illustration" class="w-40 h-40 md:w-52 md:h-52 object-contain" data-alt="A bright red friendly cartoon apple" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBcBaQciEJIcW74sMJe9eFKxSJQsf_jqJDZtvooXwjPc8S4QyBSxxdoV_QzTY4wq0DF0hpVM4GuJw_ZQnkYhIBZKuNJeyAriEfFl80-_tm-SDCagZca2GVBaR02Vzt0RFtKhNi2mNfWHWFeu8Lae2u7Ajt8vK_0tz7kUzMBIjfmbpoMZU03JCbyYTuwAVlJ9D1l1VAvI4CevaHpI6SeJGW9g-pWH4uoIHmA4AyZHs0e-dYRc4htemaw_hHisZz_GCa5PhSRUxUgFr7F"/>
</div>
<!-- Text Label -->
<div class="text-center">
<h1 class="text-4xl md:text-5xl font-bold text-slate-800 dark:text-slate-100 mb-2">One Apple</h1>
<p class="text-slate-500 dark:text-slate-400 text-lg font-medium">Touch to hear sound!</p>
</div>
</div>
<!-- Flip Button Mobile-Optimized -->
<div class="mt-8 flex justify-center">
<button class="flex items-center gap-3 bg-primary text-white px-10 py-5 rounded-full text-xl font-bold shadow-xl hover:bg-primary/90 transition-all transform hover:-translate-y-1 active:translate-y-0">
<span class="material-symbols-outlined">sync</span>
<span>Flip Card</span>
</button>
</div>
</div>
<!-- Right Arrow Button -->
<button class="hidden md:flex items-center justify-center rounded-full w-14 h-14 bg-white dark:bg-slate-800 shadow-lg border-4 border-primary/20 text-primary hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-4xl">arrow_forward_ios</span>
</button>
</div>
<!-- Progress Section -->
<div class="w-full max-w-2xl mt-12 bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-primary/5">
<div class="flex justify-between items-end mb-3 px-2">
<div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-semibold uppercase tracking-wider">Your Progress</p>
<h3 class="text-2xl font-bold text-primary">Great Start!</h3>
</div>
<div class="text-right">
<span class="text-3xl font-black text-slate-800 dark:text-slate-100">1</span>
<span class="text-xl text-slate-400">/ 10</span>
</div>
</div>
<div class="h-4 w-full bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 10%;"></div>
</div>
<div class="flex justify-between mt-3 text-sm font-medium text-slate-500">
<span>Keep going, you're doing great!</span>
<span class="text-primary font-bold">10% Completed</span>
</div>
</div>
<!-- Mobile Navigation Controls -->
<div class="md:hidden flex justify-between w-full mt-8 gap-4 px-4">
<button class="flex-1 flex items-center justify-center gap-2 rounded-xl h-14 bg-white dark:bg-slate-800 shadow-md border-2 border-primary/10 text-slate-600 font-bold">
<span class="material-symbols-outlined">arrow_back</span>
                        Previous
                    </button>
<button class="flex-1 flex items-center justify-center gap-2 rounded-xl h-14 bg-primary shadow-lg text-white font-bold">
                        Next
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
<!-- Bottom Quick Nav -->
<footer class="mt-auto py-6 px-4 flex justify-center gap-8 bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm">
<div class="flex flex-col items-center gap-1 text-primary">
<div class="bg-primary/20 p-2 rounded-full">
<span class="material-symbols-outlined">home</span>
</div>
<span class="text-xs font-bold uppercase tracking-widest">Home</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<div class="bg-slate-100 dark:bg-slate-800 p-2 rounded-full">
<span class="material-symbols-outlined">star</span>
</div>
<span class="text-xs font-bold uppercase tracking-widest">Badges</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<div class="bg-slate-100 dark:bg-slate-800 p-2 rounded-full">
<span class="material-symbols-outlined">person</span>
</div>
<span class="text-xs font-bold uppercase tracking-widest">Profile</span>
</div>
</footer>
</div>
</div>
</body></html>
