<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0ea5e9", // Sky Blue primary
                        "background-light": "#f0f9ff", // Very soft sky blue background
                        "background-dark": "#0c4a6e",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation Header -->
<header class="flex items-center justify-between border-b border-sky-100 bg-white/80 backdrop-blur-sm dark:bg-slate-900/80 px-6 py-4 md:px-20 lg:px-40 sticky top-0 z-50">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center size-10 rounded-xl bg-primary text-white shadow-lg shadow-sky-200 dark:shadow-none">
<span class="material-symbols-outlined text-2xl">rocket_launch</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-extrabold tracking-tight">Kids Learning Fun</h2>
</div>
<div class="flex items-center gap-4">
<button class="flex size-10 items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">settings</span>
</button>
<div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-primary/10 border border-primary/20">
<span class="material-symbols-outlined text-primary text-sm">stars</span>
<span class="text-primary font-bold text-sm">120</span>
</div>
</div>
</header>
<main class="flex-1 flex flex-col items-center px-4 py-8 md:px-20 lg:px-40">
<!-- Profile Greeting -->
<div class="w-full max-w-4xl flex items-center justify-between mb-8">
<div class="flex items-center gap-4">
<div class="size-14 rounded-full border-4 border-white shadow-md bg-cover bg-center" data-alt="Cartoon avatar of a smiling child" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCrO1vwWGiPT0f2IABrZtuyHTQmZuwRbZZybExOftfBlPnutXbceo1mTc5EWc5BwyDv3gnFyh9ZX7WUZtvf5F4gr5pghRvJvTRwKJW-JUw__F8GIy28TOSFDOG8pr_-hcPEsHFEUOSdbNxKYs8JOGwpYX5z7hfklPQmtw-v8RDw4cJeOazLwy5fQ5DyAZhSSNs-LC_3w5wkbPEzlytuuKekc8dcU-FL3sETnWpzP4YcuncnPF7rX4nzlcAckNYSalvPVWWcHaA68bId");'></div>
<div>
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-black">Hi, Explorer!</h1>
<p class="text-slate-500 dark:text-slate-400 font-medium">What shall we learn today?</p>
</div>
</div>
<div class="hidden md:flex gap-2">
<div class="flex flex-col items-center justify-center p-3 rounded-2xl bg-white dark:bg-slate-800 shadow-sm border border-slate-100 dark:border-slate-700">
<span class="material-symbols-outlined text-primary">local_fire_department</span>
<span class="text-[10px] font-bold text-slate-400 uppercase">Streak</span>
</div>
</div>
</div>
<!-- Page Title -->
<div class="text-center mb-10">
<h2 class="text-slate-900 dark:text-slate-100 text-4xl font-black mb-2">Pick a Topic!</h2>
<div class="h-1.5 w-24 bg-primary rounded-full mx-auto"></div>
</div>
<!-- Topic Grid -->
<div class="grid grid-cols-2 md:grid-cols-3 gap-6 w-full max-w-4xl">
<!-- Alphabet Card -->
<div class="group cursor-pointer flex flex-col items-center justify-center p-8 rounded-[2rem] bg-rose-500 shadow-lg shadow-rose-200 dark:shadow-rose-900/20 hover:scale-105 transition-transform">
<div class="bg-white/30 rounded-3xl p-6 mb-4">
<span class="material-symbols-outlined text-6xl text-white">spellcheck</span>
</div>
<h3 class="text-white text-xl font-black">Alphabet</h3>
<p class="text-rose-100 text-sm font-bold uppercase tracking-widest mt-1">ABC</p>
</div>
<!-- Numbers Card -->
<div class="group cursor-pointer flex flex-col items-center justify-center p-8 rounded-[2rem] bg-sky-500 shadow-lg shadow-sky-200 dark:shadow-sky-900/20 hover:scale-105 transition-transform">
<div class="bg-white/30 rounded-3xl p-6 mb-4">
<span class="material-symbols-outlined text-6xl text-white">counter_1</span>
</div>
<h3 class="text-white text-xl font-black">Numbers</h3>
<p class="text-sky-100 text-sm font-bold uppercase tracking-widest mt-1">123</p>
</div>
<!-- Animals Card -->
<div class="group cursor-pointer flex flex-col items-center justify-center p-8 rounded-[2rem] bg-emerald-500 shadow-lg shadow-emerald-200 dark:shadow-emerald-900/20 hover:scale-105 transition-transform">
<div class="bg-white/30 rounded-3xl p-6 mb-4">
<span class="material-symbols-outlined text-6xl text-white">pets</span>
</div>
<h3 class="text-white text-xl font-black">Animals</h3>
<p class="text-emerald-100 text-sm font-bold uppercase tracking-widest mt-1">Roar!</p>
</div>
<!-- Shapes Card -->
<div class="group cursor-pointer flex flex-col items-center justify-center p-8 rounded-[2rem] bg-amber-400 shadow-lg shadow-amber-100 dark:shadow-amber-900/20 hover:scale-105 transition-transform">
<div class="bg-white/30 rounded-3xl p-6 mb-4">
<span class="material-symbols-outlined text-6xl text-white">category</span>
</div>
<h3 class="text-white text-xl font-black">Shapes</h3>
<p class="text-amber-100 text-sm font-bold uppercase tracking-widest mt-1">Circles</p>
</div>
<!-- Colors Card -->
<div class="group cursor-pointer flex flex-col items-center justify-center p-8 rounded-[2rem] bg-indigo-500 shadow-lg shadow-indigo-200 dark:shadow-indigo-900/20 hover:scale-105 transition-transform">
<div class="bg-white/30 rounded-3xl p-6 mb-4">
<span class="material-symbols-outlined text-6xl text-white">palette</span>
</div>
<h3 class="text-white text-xl font-black">Colors</h3>
<p class="text-indigo-100 text-sm font-bold uppercase tracking-widest mt-1">Rainbow</p>
</div>
<!-- Words Card -->
<div class="group cursor-pointer flex flex-col items-center justify-center p-8 rounded-[2rem] bg-orange-500 shadow-lg shadow-orange-200 dark:shadow-orange-900/20 hover:scale-105 transition-transform">
<div class="bg-white/30 rounded-3xl p-6 mb-4">
<span class="material-symbols-outlined text-6xl text-white">menu_book</span>
</div>
<h3 class="text-white text-xl font-black">Words</h3>
<p class="text-orange-100 text-sm font-bold uppercase tracking-widest mt-1">Reading</p>
</div>
</div>
</main>
<!-- Bottom Navigation Bar for Mobile -->
<footer class="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md dark:bg-slate-900 border-t border-sky-100 dark:border-slate-800 px-6 py-3 flex justify-around items-center z-50">
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-bold uppercase">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">auto_stories</span>
<span class="text-[10px] font-bold uppercase">Learn</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">sports_esports</span>
<span class="text-[10px] font-bold uppercase">Play</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase">Profile</span>
</button>
</footer>
</div>
</div>
</body></html>
