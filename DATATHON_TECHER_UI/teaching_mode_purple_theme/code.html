<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6366f1",
                        "background-light": "#f8f6f6",
                        "background-dark": "#1a1625",

                    fontFamily: {
                        "display": ["Public Sans"]

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen overflow-hidden">
<div class="relative flex h-screen w-full flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between px-6 py-4 border-b border-primary/10 bg-background-light dark:bg-background-dark/50 backdrop-blur-md z-10">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center size-10 rounded-lg bg-primary text-white">
<span class="material-symbols-outlined">school</span>
</div>
<div>
<h2 class="text-xl font-bold leading-tight tracking-tight">Teaching Mode</h2>
<p class="text-xs font-medium text-primary uppercase tracking-widest">Active Session</p>
</div>
</div>
<div class="flex items-center gap-4">
<div class="hidden md:flex flex-col items-end mr-4">
<span class="text-sm font-bold">Classroom 101</span>
<span class="text-xs opacity-70 text-slate-600 dark:text-slate-400">Mathematics Basics</span>
</div>
<button class="flex items-center justify-center rounded-xl size-12 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">fullscreen_exit</span>
</button>
<button class="flex items-center justify-center rounded-xl size-12 bg-primary text-white shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</header>
<!-- Main Flashcard Content Area -->
<main class="flex-1 flex flex-col items-center justify-center p-6 md:p-12 gap-8 relative">
<!-- Progress Indicator -->
<div class="absolute top-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2">
<span class="text-primary font-bold text-lg">Flashcard 12 of 20</span>
<div class="w-64 h-2 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary w-[60%] rounded-full"></div>
</div>
</div>
<!-- Large Flashcard -->
<div class="w-full max-w-5xl aspect-[16/9] bg-white dark:bg-slate-900 rounded-[2rem] shadow-2xl flex flex-col md:flex-row overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Visual Side -->

<p class="text-3xl md:text-5xl font-bold text-slate-800 dark:text-slate-100 tracking-tight">Five Oranges</p>
</div>
</div>
</div>
<!-- Projection Navigation Controls -->
<div class="w-full max-w-5xl flex items-center justify-between gap-8 px-4">
<button class="flex-1 max-w-xs flex items-center justify-center gap-4 h-24 rounded-2xl bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 transition-all group">
<span class="material-symbols-outlined text-4xl group-hover:-translate-x-2 transition-transform">arrow_back</span>
<span class="text-2xl font-bold">Previous</span>
</button>
<div class="flex gap-4">
<button class="size-16 rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">volume_up</span>
</button>
<button class="size-16 rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">visibility_off</span>
</button>
</div>
<button class="flex-1 max-w-xs flex items-center justify-center gap-4 h-24 rounded-2xl bg-primary text-white hover:opacity-90 transition-all shadow-xl shadow-primary/30 group">
<span class="text-2xl font-bold">Next</span>
<span class="material-symbols-outlined text-4xl group-hover:translate-x-2 transition-transform">arrow_forward</span>
</button>
</div>
</main>
<!-- Tooltip/Hotkeys Bar -->
<footer class="py-4 px-12 border-t border-primary/10 flex justify-center bg-background-light dark:bg-background-dark/50">
<div class="flex gap-8 text-sm font-medium text-slate-500 dark:text-slate-400">
<div class="flex items-center gap-2">
<kbd class="px-2 py-1 bg-slate-200 dark:bg-slate-800 rounded text-xs font-bold text-slate-700 dark:text-slate-300 border border-slate-300 dark:border-slate-700">ESC</kbd>
<span>Exit Mode</span>
</div>
<div class="flex items-center gap-2">
<kbd class="px-2 py-1 bg-slate-200 dark:bg-slate-800 rounded text-xs font-bold text-slate-700 dark:text-slate-300 border border-slate-300 dark:border-slate-700">← / →</kbd>
<span>Navigate</span>
</div>
<div class="flex items-center gap-2">
<kbd class="px-2 py-1 bg-slate-200 dark:bg-slate-800 rounded text-xs font-bold text-slate-700 dark:text-slate-300 border border-slate-300 dark:border-slate-700">SPACE</kbd>
<span>Speak Word</span>
</div>
</div>
</footer>
</div>
</body></html>
