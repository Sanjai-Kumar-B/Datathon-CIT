<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Flashcard Gen - Teacher Edition</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6366f1",
                        "background-light": "#f8f6f6",
                        "background-dark": "#1a1a2e",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Public Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="layout-container flex flex-col h-screen">
<!-- Top Navigation -->
<header class="flex items-center justify-between px-8 py-4 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark/50 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-3">
<div class="bg-primary p-2 rounded-lg text-white">
<span class="material-symbols-outlined block">cards</span>
</div>
<h2 class="text-xl font-bold tracking-tight">Flashcard Gen</h2>
</div>
<nav class="hidden md:flex items-center gap-8">
<a class="text-sm font-semibold hover:text-primary transition-colors" href="#">My Library</a>
<a class="text-sm font-semibold hover:text-primary transition-colors" href="#">Templates</a>
<a class="text-sm font-semibold hover:text-primary transition-colors" href="#">Resources</a>
</nav>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
<span class="material-symbols-outlined">notifications</span>
</button>
<div class="size-10 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden border-2 border-primary/20">
<img alt="Teacher Profile" data-alt="Close up portrait of a friendly teacher avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBMKosLzCJe2OzAB24n5V4Ger4VQKOL8n-2fyCOjx7tZfp5xpzVs1pNVlu6t2rcXtf0bVGz7UGkW9ne-DaeaN7CiHZGcht2sMQRQzLVGkz-DOsHsHKISLlzTrsZwRYR6ONlKPHELON9EsuRHXZ2W_0fW5SoB09io8FXf30vKi19NtEJSnMgWhu9UMO12rIiYZzw0XsfZjxlLorIW4g3y5AxCxWt-zD3BuNVQRh0g8dOc6AiaQjJBzV5ng-UD-yZEWUZEBIwGNCTH5V4"/>
</div>
</div>
</header>
<main class="flex flex-1 overflow-hidden">
<!-- Left Sidebar: Configuration Panel -->
<aside class="w-80 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark/30 overflow-y-auto p-6 flex flex-col gap-8">
<div>
<h3 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-6 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">settings</span> Configuration
                    </h3>
<div class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold">Topic</label>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:border-primary focus:ring-primary transition-all p-3" type="text" value="Numbers"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold">Target Age</label>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:border-primary focus:ring-primary p-3" type="number" value="4"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold">Card Count</label>
<input class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:border-primary focus:ring-primary p-3" type="number" value="5"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold">Style Theme</label>
<div class="grid grid-cols-3 gap-2">
<button class="aspect-square rounded-lg border-2 border-primary bg-primary/10 flex flex-col items-center justify-center gap-1">
<span class="material-symbols-outlined text-primary">palette</span>
<span class="text-[10px] font-bold">Simple</span>
</button>
<button class="aspect-square rounded-lg border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 flex flex-col items-center justify-center gap-1">
<span class="material-symbols-outlined text-slate-400">forest</span>
<span class="text-[10px] font-bold text-slate-500">Nature</span>
</button>
<button class="aspect-square rounded-lg border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 flex flex-col items-center justify-center gap-1">
<span class="material-symbols-outlined text-slate-400">rocket_launch</span>
<span class="text-[10px] font-bold text-slate-500">Space</span>
</button>
</div>
</div>
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-transform active:scale-95">
<span class="material-symbols-outlined">magic_button</span>
                                Regenerate Cards
                            </button>
</div>
</div>
</div>
<div class="mt-auto border-t border-slate-100 dark:border-slate-800 pt-6">
<div class="bg-primary/5 rounded-xl p-4 border border-primary/10">
<p class="text-xs font-semibold text-primary mb-1">Pro Tip</p>
<p class="text-xs text-slate-500 leading-relaxed">Try adding sub-topics for more specific image generation.</p>
</div>
</div>
</aside>
<!-- Main Content: Preview Grid -->
<section class="flex-1 bg-slate-50 dark:bg-background-dark/50 overflow-y-auto p-8">
<div class="max-w-5xl mx-auto">
<div class="flex items-center justify-between mb-8">
<div>
<h1 class="text-2xl font-bold">Preview Grid</h1>
<p class="text-slate-500 text-sm">Review your flashcards before finalizing.</p>
</div>
<div class="flex gap-3">
<button class="px-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-slate-50 transition-colors">
<span class="material-symbols-outlined text-lg">print</span> Print
                            </button>
<button class="px-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-slate-50 transition-colors">
<span class="material-symbols-outlined text-lg">download</span> Download
                            </button>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
<!-- Card 1 -->
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col aspect-[3/4] group transition-all hover:shadow-xl hover:border-primary/30">
<div class="flex-1 p-6 flex flex-col items-center justify-center gap-6">
<div class="text-7xl font-black text-primary">1</div>
<div class="w-32 h-32 bg-red-50 dark:bg-red-900/20 rounded-full flex items-center justify-center text-6xl">🍎</div>
<div class="text-2xl font-bold tracking-wide">Apple</div>
</div>
<div class="p-3 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-800 flex justify-end gap-2">
<button class="p-1.5 hover:text-primary transition-colors"><span class="material-symbols-outlined text-lg">edit</span></button>
<button class="p-1.5 hover:text-red-500 transition-colors"><span class="material-symbols-outlined text-lg">delete</span></button>
</div>
</div>
<!-- Card 2 -->
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col aspect-[3/4] group transition-all hover:shadow-xl hover:border-primary/30">
<div class="flex-1 p-6 flex flex-col items-center justify-center gap-6">
<div class="text-7xl font-black text-primary">2</div>
<div class="w-32 h-32 bg-blue-50 dark:bg-blue-900/20 rounded-full flex items-center justify-center text-6xl">⚽</div>
<div class="text-2xl font-bold tracking-wide">Ball</div>
</div>
<div class="p-3 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-800 flex justify-end gap-2">
<button class="p-1.5 hover:text-primary transition-colors"><span class="material-symbols-outlined text-lg">edit</span></button>
<button class="p-1.5 hover:text-red-500 transition-colors"><span class="material-symbols-outlined text-lg">delete</span></button>
</div>
</div>
<!-- Card 3 -->
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col aspect-[3/4] group transition-all hover:shadow-xl hover:border-primary/30">
<div class="flex-1 p-6 flex flex-col items-center justify-center gap-6">
<div class="text-7xl font-black text-primary">3</div>
<div class="w-32 h-32 bg-yellow-50 dark:bg-yellow-900/20 rounded-full flex items-center justify-center text-6xl">⭐</div>
<div class="text-2xl font-bold tracking-wide">Star</div>
</div>
<div class="p-3 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-800 flex justify-end gap-2">
<button class="p-1.5 hover:text-primary transition-colors"><span class="material-symbols-outlined text-lg">edit</span></button>
<button class="p-1.5 hover:text-red-500 transition-colors"><span class="material-symbols-outlined text-lg">delete</span></button>
</div>
</div>
<!-- Add Card Placeholder -->
<button class="rounded-2xl border-2 border-dashed border-slate-200 dark:border-slate-700 flex flex-col items-center justify-center aspect-[3/4] hover:border-primary hover:bg-primary/5 transition-all text-slate-400 hover:text-primary">
<span class="material-symbols-outlined text-4xl mb-2">add_circle</span>
<span class="font-bold">Add Manual Card</span>
</button>
</div>
<!-- Bottom Action Bar -->
<div class="mt-12 flex flex-wrap gap-4 items-center justify-center bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-100 dark:border-slate-700">
<button class="bg-primary px-8 py-3 rounded-xl text-white font-bold flex items-center gap-2 hover:bg-primary/90 transition-all active:scale-95 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">play_arrow</span>
                            Start Teaching Mode
                        </button>
<button class="bg-primary/10 text-primary px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:bg-primary/20 transition-all active:scale-95">
<span class="material-symbols-outlined">school</span>
                            Send to Classroom
                        </button>
<div class="h-8 w-px bg-slate-200 dark:bg-slate-700 hidden sm:block"></div>
<div class="flex items-center gap-4">
<span class="text-sm font-medium text-slate-500">Auto-save: <span class="text-green-500">Enabled</span></span>
<span class="material-symbols-outlined text-green-500">cloud_done</span>
</div>
</div>
</div>
</section>
</main>
</div>
</body></html>
